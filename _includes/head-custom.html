<link rel="icon" type="image/jpeg" href="{{ '/assets/images/favicon.jpg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.jpg' | relative_url }}">

<!-- Open Graph tags for social sharing -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="https://all-seasons-fitness.com/assets/images/class_indoor_large.jpg">
<meta property="og:url" content="https://all-seasons-fitness.com{{ page.url }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="All Seasons Fitness">

<!-- Twitter Card tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="https://all-seasons-fitness.com/assets/images/class_indoor_large.jpg">
